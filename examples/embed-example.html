<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coupon Game Embed Example</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #102027;
        background: #eef2f7;
      }

      .page {
        display: grid;
        gap: 16px;
        width: min(100% - 24px, 980px);
        margin: 0 auto;
        padding: 18px 0;
      }

      header,
      .event-log {
        padding: 16px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #ffffff;
      }

      h1,
      p {
        margin: 0;
      }

      p {
        margin-top: 8px;
        color: #526173;
        line-height: 1.5;
      }

      iframe {
        width: 100%;
        min-height: 760px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #ffffff;
      }

      pre {
        min-height: 120px;
        max-height: 260px;
        overflow: auto;
        margin: 10px 0 0;
        padding: 12px;
        border-radius: 8px;
        color: #dbeafe;
        background: #0f172a;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Parent App Embed Example</h1>
        <p>This page embeds the coupon game in an iframe and listens for postMessage events.</p>
      </header>

      <iframe
        id="couponGameFrame"
        title="Coupon game"
        src="/?campaignId=hotel-spring-2026&userId=demo-user-42&source=embed-example&locale=en-US&embedded=true"
      ></iframe>

      <section class="event-log" aria-live="polite">
        <h2>Received Events</h2>
        <pre id="eventLog">Waiting for game events...</pre>
      </section>
    </main>

    <script>
      const eventLog = document.getElementById('eventLog');
      const frame = document.getElementById('couponGameFrame');

      window.addEventListener('message', (event) => {
        const message = event.data;

        if (!message || message.type !== 'coupon_game_event') {
          return;
        }

        const current = eventLog.textContent === 'Waiting for game events...' ? '' : `${eventLog.textContent}\n\n`;
        eventLog.textContent = `${current}${JSON.stringify(message, null, 2)}`;

        if (message.eventName === 'close_game' || message.eventName === 'game_closed') {
          frame.style.display = 'none';
        }
      });
    </script>
  </body>
</html>
